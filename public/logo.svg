<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="snake1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="snake2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="chain" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#94a3b8"/>
      <stop offset="50%" style="stop-color:#cbd5e1"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="#0a0a0f" stroke="url(#grad)" stroke-width="3"/>

  <!-- Chain links on sides -->
  <g stroke="url(#chain)" stroke-width="3" fill="none" opacity="0.6">
    <path d="M8 30 Q4 40 8 50" stroke-linecap="round"/>
    <path d="M4 35 Q0 40 4 45"/>
    <path d="M112 30 Q116 40 112 50" stroke-linecap="round"/>
    <path d="M116 35 Q120 40 116 45"/>
    <path d="M12 55 Q6 65 12 75" stroke-linecap="round"/>
    <path d="M108 55 Q114 65 108 75" stroke-linecap="round"/>
  </g>

  <!-- Face -->
  <ellipse cx="60" cy="58" rx="22" ry="26" fill="#1a1a25" stroke="url(#grad)" stroke-width="1.5"/>

  <!-- Eyes - glowing -->
  <g filter="url(#glow)">
    <ellipse cx="51" cy="52" rx="5" ry="3.5" fill="#ef4444"/>
    <ellipse cx="69" cy="52" rx="5" ry="3.5" fill="#ef4444"/>
    <ellipse cx="51" cy="52" rx="2" ry="3" fill="#fbbf24"/>
    <ellipse cx="69" cy="52" rx="2" ry="3" fill="#fbbf24"/>
  </g>

  <!-- Nose -->
  <path d="M58 56 L60 60 L62 56" fill="none" stroke="#8888aa" stroke-width="1" stroke-linecap="round"/>

  <!-- Mouth - slight smirk -->
  <path d="M52 66 Q60 70 68 65" fill="none" stroke="#8888aa" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Snake hair - left side -->
  <g fill="none" stroke-width="2.5" stroke-linecap="round">
    <path d="M42 40 Q35 25 30 18 Q25 12 20 18 Q15 25 20 30" stroke="url(#snake1)"/>
    <path d="M38 36 Q28 20 22 15 Q16 10 12 16" stroke="url(#snake1)" opacity="0.8"/>
    <path d="M44 44 Q30 35 22 38 Q16 42 18 48" stroke="url(#snake2)"/>
    <path d="M40 42 Q25 40 18 45 Q12 52 16 56" stroke="url(#snake1)" opacity="0.7"/>
  </g>

  <!-- Snake hair - right side -->
  <g fill="none" stroke-width="2.5" stroke-linecap="round">
    <path d="M78 40 Q85 25 90 18 Q95 12 100 18 Q105 25 100 30" stroke="url(#snake1)"/>
    <path d="M82 36 Q92 20 98 15 Q104 10 108 16" stroke="url(#snake1)" opacity="0.8"/>
    <path d="M76 44 Q90 35 98 38 Q104 42 102 48" stroke="url(#snake2)"/>
    <path d="M80 42 Q95 40 102 45 Q108 52 104 56" stroke="url(#snake1)" opacity="0.7"/>
  </g>

  <!-- Snake heads (small circles at ends) -->
  <g filter="url(#glow)">
    <circle cx="20" cy="30" r="2.5" fill="#22c55e"/>
    <circle cx="12" cy="16" r="2" fill="#22c55e" opacity="0.8"/>
    <circle cx="18" cy="48" r="2.5" fill="#a855f7"/>
    <circle cx="16" cy="56" r="2" fill="#22c55e" opacity="0.7"/>
    <circle cx="100" cy="30" r="2.5" fill="#22c55e"/>
    <circle cx="108" cy="16" r="2" fill="#22c55e" opacity="0.8"/>
    <circle cx="102" cy="48" r="2.5" fill="#a855f7"/>
    <circle cx="104" cy="56" r="2" fill="#22c55e" opacity="0.7"/>
  </g>

  <!-- Chain at bottom -->
  <g stroke="url(#chain)" stroke-width="3" fill="none" opacity="0.5">
    <path d="M40 82 Q50 88 60 82 Q70 76 80 82" stroke-linecap="round"/>
    <ellipse cx="40" cy="82" rx="4" ry="3" fill="none"/>
    <ellipse cx="80" cy="82" rx="4" ry="3" fill="none"/>
  </g>

  <!-- Text -->
  <text x="60" y="108" text-anchor="middle" fill="url(#grad)" font-family="system-ui, sans-serif" font-size="11" font-weight="800" letter-spacing="1">JAILMEDUSA</text>
</svg>
